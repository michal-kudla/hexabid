openapi: 3.0.3
info:
  title: Auctions API
  version: 1.0.0
servers:
  - url: http://localhost:8080
tags:
  - name: Auctions
  - name: Products
  - name: Inventory
paths:
  /api/products:
    get:
      operationId: browseProductTypes
      tags:
        - Products
      summary: Browse all product types in catalog
      description: |
        Returns paginated list of all product types available in the system.
        This is the main entry point for displaying the product catalog.
        
        **Archetypowy kontekst:** Product (M02 - Katalog Produktów)
        Produkt to definicja "co to jest" - niezależny kontekst od Inventory.
        ProductType reprezentuje szablon, według którego tworzone są instancje.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: query
          description: Filter by product name (partial match, case-insensitive)
          schema:
            type: string
        - in: query
          name: trackingStrategy
          description: Filter by product tracking strategy
          schema:
            $ref: '#/components/schemas/ProductTrackingStrategy'
        - in: query
          name: limit
          description: Maximum number of items to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          description: Cursor for pagination - returns items after this cursor
          schema:
            type: string
      responses:
        '200':
          description: Product type list (paginated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTypeListResponse'
        '400':
          description: Invalid request parameters
    post:
      operationId: createProductType
      tags:
        - Products
      summary: Define a new product type
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductTypeRequest'
      responses:
        '201':
          description: Product type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTypeResponse'
        '400':
          description: Invalid request
  /api/products/{productId}:
    get:
      operationId: getProductType
      tags:
        - Products
      summary: Get product type by ID
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTypeResponse'
        '404':
          description: Product type not found
  /api/batches:
    get:
      operationId: browseBatches
      tags:
        - Inventory
      summary: Browse batches for current user
      description: |
        Returns paginated list of production batches owned by the authenticated user.
        Batches are used to track products that come from the same production source.
        
        **Archetypowy kontekst:** Inventory (M06)
        Batch reprezentuje partię produkcyjną - grupę produktów o wspólnym pochodzeniu.
        Np. kontener kukurydzy z gospodarstwa X, zbiór 2026.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: productId
          description: Filter by product type ID
          schema:
            type: string
            format: uuid
        - in: query
          name: query
          description: Filter by batch name (partial match)
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Batch list (paginated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchListResponse'
        '401':
          description: Authentication required
    post:
      operationId: createBatch
      tags:
        - Inventory
      summary: Define a new production batch
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBatchRequest'
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '400':
          description: Invalid request
  /api/batches/{batchId}:
    get:
      operationId: getBatch
      tags:
        - Inventory
      summary: Get batch by ID
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: path
          name: batchId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '404':
          description: Batch not found
  /api/inventory/instances:
    get:
      operationId: browseInventoryInstances
      tags:
        - Inventory
      summary: Browse inventory instances for current user
      description: |
        Returns paginated list of inventory instances owned by the authenticated user.
        Instances represent specific quantities of product that can be sold on auction.
        
        **Archetypowy kontekst:** Inventory (M06) - ProductInstance
        Instancja to konkretna ilość produktu z danej partii.
        Np. "worek 100 kg kukurydzy z partii KUKURYDZA-2026-001"
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: batchId
          description: Filter by batch ID
          schema:
            type: string
            format: uuid
        - in: query
          name: productId
          description: Filter by product type ID
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Inventory instance list (paginated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryInstanceListResponse'
        '401':
          description: Authentication required
    post:
      operationId: createInventoryInstance
      tags:
        - Inventory
      summary: Create an inventory instance for auction
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInventoryInstanceRequest'
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryInstanceResponse'
        '400':
          description: Invalid request
  /api/inventory/instances/{instanceId}:
    get:
      operationId: getInventoryInstance
      tags:
        - Inventory
      summary: Get inventory instance by ID
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: path
          name: instanceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryInstanceResponse'
        '404':
          description: Instance not found
  /api/lots:
    get:
      operationId: browseLots
      tags:
        - Auctions
      summary: Browse lots for current user
      description: |
        Returns paginated list of lots owned by the authenticated user.
        A lot is a bridge between inventory and auction - it defines what is being sold.
        
        **Archetypowy kontekst:** Lot (most Product↔Auction)
        Lot określa: jakie instancje inventory są wystawione na sprzedaż,
        w jakim trybie (całość/podzielne), cena rezerwowa.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: sellingMode
          description: Filter by selling mode
          schema:
            $ref: '#/components/schemas/SellingMode'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Lot list (paginated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotListResponse'
        '401':
          description: Authentication required
    post:
      operationId: createLot
      tags:
        - Auctions
      summary: Create a lot (bridge inventory to auction)
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLotRequest'
      responses:
        '201':
          description: Lot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotResponse'
        '400':
          description: Invalid request
  /api/lots/{lotId}:
    get:
      operationId: getLot
      tags:
        - Auctions
      summary: Get lot by ID
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: path
          name: lotId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotResponse'
        '404':
          description: Lot not found
  /api/auctions:
    get:
      operationId: browseAuctions
      tags:
        - Auctions
      summary: Browse auctions for search and listing screens
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AuctionStatus'
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/AuctionSort'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Auction list page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionListResponse'
    post:
      operationId: createAuction
      tags:
        - Auctions
      summary: Create a new auction
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuctionRequest'
      responses:
        '201':
          description: Auction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
  /api/auctions/{auctionId}:
    get:
      operationId: getAuctionById
      tags:
        - Auctions
      summary: Get auction details
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: path
          name: auctionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Auction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
        '404':
          description: Auction not found
  /api/me:
    get:
      operationId: getCurrentUserProfile
      tags:
        - Auctions
      summary: Get current authenticated user profile
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserProfileResponse'
        '401':
          description: Authentication required
  /api/me/auctions:
    get:
      operationId: browseMyAuctions
      tags:
        - Auctions
      summary: Browse auctions created by current user
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AuctionStatus'
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/AuctionSort'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Current user auctions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionListResponse'
        '401':
          description: Authentication required
  /api/me/bids:
    get:
      operationId: browseMyBids
      tags:
        - Auctions
      summary: Browse auctions where current user placed bids
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AuctionStatus'
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/AuctionSort'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: after
          schema:
            type: string
      responses:
        '200':
          description: Current user bid auctions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionListResponse'
        '401':
          description: Authentication required
components:
  parameters:
    ApiVersionHeader:
      in: header
      name: X-API-Version
      required: false
      schema:
        type: string
        default: "1"
      description: API version negotiated via HTTP header.
  schemas:
    AuctionStatus:
      type: string
      enum:
        - OPEN
        - CLOSED
    AuctionSort:
      type: string
      enum:
        - ENDING_SOON
        - ENDING_LATEST
    Money:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          example: "120.00"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: PLN
    CreateAuctionRequest:
      type: object
      required:
        - title
        - startingPrice
        - endsAt
      properties:
        title:
          type: string
        startingPrice:
          $ref: '#/components/schemas/Money'
        endsAt:
          type: string
          format: date-time
        lotId:
          type: string
          format: uuid
        buyNowPrice:
          $ref: '#/components/schemas/Money'
    BidResponse:
      type: object
      required:
        - bidderId
        - amount
        - currency
        - placedAt
      properties:
        bidderId:
          type: string
        amount:
          type: string
        currency:
          type: string
        placedAt:
          type: string
          format: date-time
    AuctionResponse:
      type: object
      required:
        - auctionId
        - sellerId
        - title
        - currentPrice
        - currency
        - endsAt
        - status
        - bids
      properties:
        auctionId:
          type: string
          format: uuid
        sellerId:
          type: string
        title:
          type: string
        currentPrice:
          type: string
        currency:
          type: string
        endsAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/AuctionStatus'
        leadingBidderId:
          type: string
        lotId:
          type: string
          format: uuid
        buyNowPrice:
          type: object
          properties:
            amount:
              type: string
            currency:
              type: string
        bids:
          type: array
          items:
            $ref: '#/components/schemas/BidResponse'
    AuctionListItemResponse:
      type: object
      required:
        - auctionId
        - sellerId
        - title
        - currentPrice
        - currency
        - endsAt
        - status
      properties:
        auctionId:
          type: string
          format: uuid
        sellerId:
          type: string
        title:
          type: string
        currentPrice:
          type: string
        currency:
          type: string
        endsAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/AuctionStatus'
        leadingBidderId:
          type: string
    AuctionListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuctionListItemResponse'
        nextCursor:
          type: string
    CurrentUserProfileResponse:
      type: object
      required:
        - partyId
        - provider
        - displayName
        - verified
      properties:
        partyId:
          type: string
        provider:
          type: string
        displayName:
          type: string
        email:
          type: string
        verified:
          type: boolean
    ProductTrackingStrategy:
      type: string
      enum:
        - UNIQUE
        - INDIVIDUALLY_TRACKED
        - BATCH_TRACKED
        - INDIVIDUALLY_AND_BATCH_TRACKED
        - IDENTICAL
    CreateProductTypeRequest:
      type: object
      required:
        - name
        - description
        - trackingStrategy
        - preferredUnit
      properties:
        name:
          type: string
          example: "Jan Kowalski's Car"
        description:
          type: string
          example: "Seat Leon 1999 TDI"
        trackingStrategy:
          $ref: '#/components/schemas/ProductTrackingStrategy'
        preferredUnit:
          type: string
          example: "pcs"
    ProductTypeResponse:
      type: object
      required:
        - productId
        - name
        - trackingStrategy
        - preferredUnit
      properties:
        productId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        trackingStrategy:
          $ref: '#/components/schemas/ProductTrackingStrategy'
        preferredUnit:
          type: string
    CreateBatchRequest:
      type: object
      required:
        - productId
        - name
        - quantity
      properties:
        productId:
          type: string
          format: uuid
        name:
          type: string
          example: "POTATO-2024-WARSZAWA-001"
        quantity:
          type: object
          required:
            - amount
            - unit
          properties:
            amount:
              type: string
              example: "2000"
            unit:
              type: string
              example: "kg"
        dateProduced:
          type: string
          format: date-time
        bestBefore:
          type: string
          format: date-time
    BatchResponse:
      type: object
      required:
        - batchId
        - productId
        - name
        - quantity
      properties:
        batchId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: object
          properties:
            amount:
              type: string
            unit:
              type: string
        dateProduced:
          type: string
          format: date-time
        bestBefore:
          type: string
          format: date-time
    CreateInventoryInstanceRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        serialNumber:
          type: string
          example: "VIN-WVWZZZ3CZWE123456"
        quantity:
          type: object
          required:
            - amount
            - unit
          properties:
            amount:
              type: string
              example: "100"
            unit:
              type: string
              example: "kg"
    InventoryInstanceResponse:
      type: object
      required:
        - instanceId
        - productId
        - quantity
      properties:
        instanceId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        serialNumber:
          type: string
        quantity:
          type: object
          properties:
            amount:
              type: string
            unit:
              type: string
    SellingMode:
      type: string
      enum:
        - WHOLE
        - DIVISIBLE
        - DIVISIBLE_ONLY
    CreateLotRequest:
      type: object
      required:
        - title
        - description
        - inventoryEntryId
        - sellingMode
      properties:
        title:
          type: string
          example: "2 worki ziemniaków po 100 kg"
        description:
          type: string
          example: "Świeże ziemniaki z partii POTATO-2024-WARSZAWA-001"
        inventoryEntryId:
          type: string
          format: uuid
        sellingMode:
          $ref: '#/components/schemas/SellingMode'
        reservePrice:
          $ref: '#/components/schemas/Money'
    LotResponse:
      type: object
      required:
        - lotId
        - title
        - sellingMode
      properties:
        lotId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        inventoryEntryId:
          type: string
          format: uuid
        sellingMode:
          $ref: '#/components/schemas/SellingMode'
        reservePrice:
          type: object
          properties:
            amount:
              type: string
            currency:
              type: string
    ProductTypeListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: List of product types
          items:
            $ref: '#/components/schemas/ProductTypeResponse'
        nextCursor:
          type: string
          description: Cursor for pagination - pass this in next request to get next page
          nullable: true
    BatchListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: List of batches
          items:
            $ref: '#/components/schemas/BatchResponse'
        nextCursor:
          type: string
          nullable: true
    InventoryInstanceListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: List of inventory instances
          items:
            $ref: '#/components/schemas/InventoryInstanceResponse'
        nextCursor:
          type: string
          nullable: true
    LotListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: List of lots
          items:
            $ref: '#/components/schemas/LotResponse'
        nextCursor:
          type: string
          nullable: true

openapi: 3.0.3
info:
  title: External KYC API
  version: 1.0.0
servers:
  - url: https://kyc.example.test
tags:
  - name: KycVerification
paths:
  /api/kyc/actors/{actorId}:
    get:
      operationId: verifyActor
      tags:
        - KycVerification
      parameters:
        - in: path
          name: actorId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycVerificationResponse'
components:
  schemas:
    KycVerificationResponse:
      type: object
      required:
        - actorId
        - verified
      properties:
        actorId:
          type: string
        verified:
          type: boolean

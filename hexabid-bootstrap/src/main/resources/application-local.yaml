server:
  port: 18080
  servlet:
    context-path: /hexabid

spring:
  jpa:
    show-sql: false
  cors:
    allowed-origins: http://localhost:14200
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    allow-credentials: true

logging:
  file:
    name: /work/var/log/hexabid.log

auctions:
  seed:
    enabled: true

